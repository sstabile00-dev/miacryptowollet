<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>MiaCryptoWallet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js"></script>
  <style>
    /* Tutto il tuo bellissimo CSS rimane identico (non l'ho toccato) */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07080a;
      --surface: #111316;
      --surface2: #181b1f;
      --border: rgba(255,255,255,0.07);
      --accent: #00e5a0;
      --accent-dim: rgba(0, 229, 160, 0.12);
      --accent-glow: rgba(0, 229, 160, 0.25);
      --warn: #f59e0b;
      --warn-dim: rgba(245, 158, 11, 0.1);
      --text: #e8eaed;
      --muted: #6b7280;
      --danger: #ef4444;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
    /* ... (tutto il resto del tuo CSS è identico, non lo ripeto per brevità) ... */
  </style>
</head>
<body>
  <div class="app">
    <!-- Tutto il tuo HTML rimane identico fino al pulsante send -->
    <!-- ... (header, fee-banner, hero, wallet-card, send-panel, chat-panel) ... -->

    <!-- SOLO la parte SEND è stata aggiornata con il contratto -->
    <div class="send-panel" id="sendPanel">
      <div class="send-title"><i class="fas fa-paper-plane" style="color:var(--accent);font-size:16px;"></i> Invia ETH</div>
      <div class="field-label">Destinatario</div>
      <input class="field-input" id="toInput" type="text" placeholder="0x..." oninput="updateFeePreview()">
      <div class="field-label">Importo (ETH)</div>
      <input class="field-input" id="amtInput" type="number" step="0.0001" min="0" placeholder="es. 0.05" oninput="updateFeePreview()">
      
      <div class="fee-preview" id="feePreview">
        <!-- preview rimane identica -->
      </div>
      
      <button class="btn-send" id="sendBtn" onclick="sendWithFee()">
        <i class="fas fa-arrow-right"></i> Invia ora
      </button>
    </div>
  </div>

  <script>
    const FEE_RECIPIENT = "0x0bd4dd01a56c6a488fa4e2d8b1c8150c937f6526"; // il tuo contratto
    let userAddress = null;
    let provider = null;
    let signer = null;

    // Mobile deep link migliorato
    function openMetaMaskDeepLink() {
      const url = encodeURIComponent(window.location.href);
      window.location.href = `https://metamask.app.link/dapp/${url}`;
    }

    async function connectWallet() {
      if (!window.ethereum) {
        if (/Mobi|Android|iPhone/i.test(navigator.userAgent)) {
          openMetaMaskDeepLink();
        } else {
          document.getElementById('noMmPanel').classList.add('show');
        }
        return;
      }
      // resto del tuo codice connectWallet rimane identico
      // ... (il resto è già perfetto)
    }

    // FEE GARANTITA con contratto (una sola transazione)
    async function sendWithFee() {
      if (!userAddress) return showToast('error', '✕', 'Connetti prima il wallet');
      const to = document.getElementById('toInput').value.trim();
      const amt = document.getElementById('amtInput').value.trim();
      if (!to || !amt) return showToast('error', '✕', 'Compila tutti i campi');

      const provider = new ethers.providers.Web3Provider(window.ethereum);
      const signer = provider.getSigner();
      const abi = ["function sendWithFee(address payable to) external payable"];
      const contract = new ethers.Contract(FEE_RECIPIENT, abi, signer);
      const value = ethers.utils.parseEther(amt);

      try {
        const btn = document.getElementById('sendBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Conferma in MetaMask...';

        const tx = await contract.sendWithFee(to, { value });
        await tx.wait();

        showToast('success', '✓', `Inviato! Fee 0.5% andata automaticamente a te come founder.`);
        document.getElementById('amtInput').value = '';
        document.getElementById('toInput').value = '';
      } catch (e) {
        showToast('error', '✕', 'Errore: ' + e.message);
      } finally {
        const btn = document.getElementById('sendBtn');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-arrow-right"></i> Invia ora';
      }
    }

    // Il resto del tuo script (chatbot, toast, balance...) rimane identico
  </script>
</body>
</html>
